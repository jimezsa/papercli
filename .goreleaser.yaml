# GoReleaser configuration for papercli
# See: https://goreleaser.com

version: 2

project_name: papercli

changelog:
  disable: true

builds:
  - id: papercli
    main: ./cmd/papercli
    binary: papercli
    ldflags: >-
      -s -w
      -X main.version={{ .Tag }}
      -X main.commit={{ .ShortCommit }}
      -X main.date={{ .Date }}
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: papercli_darwin
    main: ./cmd/papercli
    binary: papercli
    ldflags: >-
      -s -w
      -X main.version={{ .Tag }}
      -X main.commit={{ .ShortCommit }}
      -X main.date={{ .Date }}
    env:
      - CGO_ENABLED=1
    targets:
      - darwin_amd64
      - darwin_arm64

archives:
  - builds:
      - papercli
      - papercli_darwin
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

brews:
  - repository:
      owner: jimezsa
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    homepage: "https://github.com/jimezsa/papercli"
    description: "Scientific papers from your terminal."
    license: "MIT"
    install: |
      bin.install "papercli"
